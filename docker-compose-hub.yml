version: '3.8'

services:
  # ── MySQL Database ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecs_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: ecs_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Lưu ý: Khi chạy độc lập không có mã nguồn, bạn cần tải thư mục database chứa schema.sql và seed.sql về
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p12345678"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API (Kéo từ Docker Hub) ─────────────────
  backend:
    image: tuyenlv372/ecs-backend:latest
    container_name: ecs_backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecs_db
      DB_USER: root
      DB_PASSWORD: 12345678
      JWT_SECRET: ecs_super_secret_jwt_key_2024_excell_on_services
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend React (Kéo từ Docker Hub) ──────────────
  frontend:
    image: tuyenlv372/ecs-frontend:latest
    container_name: ecs_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
